name: Build and Push Ocserv Docker Image

on:
    push:
        branches: ["master"]
    pull_request:
        branches: ["master"]

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
            # 1. 拉取仓库代码
            - name: Checkout Code
              uses: actions/checkout@v4

            # 2. 设置 Docker Buildx
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            # 3. 登录到 Docker Hub
            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            # 4. 构建并推送镜像
            - name: Build and Push Docker Image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./Dockerfile
                  push: true
                  tags: |
                      ${{ secrets.DOCKERHUB_USERNAME }}/ocserv-alpine:latest
                      ${{ secrets.DOCKERHUB_USERNAME }}/ocserv-alpine:1.5.0
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
